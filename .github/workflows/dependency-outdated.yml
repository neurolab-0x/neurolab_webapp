name: Dependency Outdated Check

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1"

permissions:
  contents: read

jobs:
  outdated:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check outdated dependencies
        id: outdated
        shell: bash
        run: |
          set +e
          npm outdated --json > outdated.json
          status_code=$?
          set -e

          if [ "$status_code" -eq 0 ]; then
            echo "status=up-to-date" >> "$GITHUB_OUTPUT"
            echo "{}" > outdated.json
            echo "All dependencies are up to date." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if [ "$status_code" -eq 1 ]; then
            echo "status=outdated" >> "$GITHUB_OUTPUT"
            echo "Outdated dependencies were found." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat outdated.json >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "npm outdated failed with unexpected exit code: $status_code" >&2
          exit "$status_code"

      - name: Upload outdated report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: outdated-report
          path: outdated.json
          if-no-files-found: warn
