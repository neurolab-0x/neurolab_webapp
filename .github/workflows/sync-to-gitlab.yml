name: Sync to GitLab

on:
  push:
    branches:
      - master # Changed from main to match your current branch

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to GitLab
        run: |
          git remote add gitlab git@gitlab.com:neurolab.inc/platform.git
          # Note: This requires an SSH key secret to be set in GH
          git push gitlab master --force