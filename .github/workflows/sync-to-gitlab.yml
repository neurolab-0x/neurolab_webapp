name: Sync to GitLab

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to GitLab Remote
        env:
          GITLAB_REPO: ${{ secrets.GITLAB_REPO }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
        run: |
          if [[ -z "$GITLAB_REPO" || -z "$GITLAB_TOKEN" ]]; then
            echo "Error: Missing GitLab secrets. Please ensure GITLAB_REPO and GITLAB_TOKEN are set."
            exit 1
          fi

          # GitLab accepts token in this format: https://oauth2:TOKEN@gitlab.com/...
          AUTH_URL="https://oauth2:${GITLAB_TOKEN}@${GITLAB_REPO#https://}"
          git remote add gitlab "$AUTH_URL"
          
          # Push all branches and tags
          git push gitlab --mirror --force